version: "3.9"

services:
  # ── Infrastructure ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: vulntriage-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5433}:5433"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vulntriage}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vulntriage_dev}
      POSTGRES_DB: ${POSTGRES_DB:-vulntriage}
    volumes:
      - pgdata:/var/lib/postgresql/data
    command: ["-p", "5433"]

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: vulntriage-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # ── FastAPI Backend ────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vulntriage-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-vulntriage}:${POSTGRES_PASSWORD:-vulntriage_dev}@postgres:5433/${POSTGRES_DB:-vulntriage}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
    depends_on:
      postgres:
        condition: service_started
      qdrant:
        condition: service_started

  # ── React Frontend (nginx) ────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vulntriage-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_started

volumes:
  pgdata:
  qdrant_data:
